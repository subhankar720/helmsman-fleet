apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-vault
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/subhankar720/helmsman-fleet.git
    targetRevision: main
    path: platform/vault
    directory:
      exclude: "argocd-application.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: vault
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
