apiVersion: v1
kind: ConfigMap
metadata:
  name: helmsman-realm
  namespace: keycloak
  annotations:
    # NOTE: This ConfigMap contains a test user password in plaintext.
    # This is acceptable for dev/learning because:
    # 1. platform-admin is a synthetic test identity, not a real user
    # 2. The password grants access only to this local dev Keycloak instance
    # In production: user provisioning would be handled via Keycloak admin API
    # called by an operator, with passwords generated by Vault and never in git.
    helmsman.dev/secret-classification: dev-only
data:
  helmsman-realm.json: |
    {
      "realm": "helmsman",
      "enabled": true,
      "displayName": "Helmsman Platform",
      "sslRequired": "external",
      "registrationAllowed": false,
      "loginWithEmailAllowed": true,
      "bruteForceProtected": true,
      "users": [
        {
          "username": "platform-admin",
          "enabled": true,
          "email": "platform-admin@helmsman.dev",
          "credentials": [
            {
              "type": "password",
              "value": "helmsman123",
              "temporary": false
            }
          ],
          "realmRoles": ["default-roles-helmsman"]
        }
      ]
    }
