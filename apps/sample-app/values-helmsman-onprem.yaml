appName: sample-app
owningTeam: platform-team
costCenterId: "000001"
notifyChannel: "#helmsman-alerts"

image:
  repository: ghcr.io/subhankar720/helmsman-app
  tag: "latest"

container:
  port: 8080
  command: ["/app/server"]
  env:
    APP_ENV: dev

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

oidc:
  enabled: false

replicas: 1

service:
  type: ClusterIP
