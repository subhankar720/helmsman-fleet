# ── Headless Service ──────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.appName }}-headless
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "golden-path-chart.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "golden-path-chart.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.container.port }}
      targetPort: http
---
# ── Traffic Service ───────────────────────────────────────────────────────────
# When OIDC is enabled: exposes port 4180 (oauth2-proxy/ADC) — never the app port directly.
# When OIDC is disabled: exposes the app port directly.
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.appName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "golden-path-chart.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "golden-path-chart.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 80
      {{- if .Values.oidc.enabled }}
      targetPort: 4180
      {{- else }}
      targetPort: http
      {{- end }}
      protocol: TCP
