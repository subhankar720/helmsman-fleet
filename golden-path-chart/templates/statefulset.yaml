apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.appName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "golden-path-chart.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "golden-path-chart.selectorLabels" . | nindent 6 }}
  serviceName: {{ .Values.appName }}-headless
  # Parallel: all pods start/stop simultaneously.
  # We have no ordering dependency (no legacy Zookeeper registration),
  # so Parallel gives faster rollouts than the default OrderedReady.
  podManagementPolicy: Parallel
  template:
    metadata:
      labels:
        {{- include "golden-path-chart.labels" . | nindent 8 }}
      annotations:
        helmsman.dev/cost-center: {{ .Values.costCenterId | quote }}
        helmsman.dev/owning-team: {{ .Values.owningTeam }}
    spec:
      serviceAccountName: {{ .Values.appName }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      volumes:
        # Shared log volume: app writes here, fluent-bit reads from here.
        - name: app-logs
          emptyDir: {}
        - name: fluent-bit-config
          configMap:
            name: {{ .Values.appName }}-fluent-bit-config
      containers:
        # ── Container 1: Application ─────────────────────────────────────────
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.container.command }}
          command: {{ .Values.container.command | toJson }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.container.port }}
              protocol: TCP
          env:
            - name: SERVER_PORT
              value: {{ .Values.container.port | quote }}
            {{- range $key, $value := .Values.container.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: app-logs
              mountPath: /var/log/app
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
        # ── Container 2: Fluent Bit (log shipper) ────────────────────────────
        # Phase 1: outputs to stdout (visible via kubectl logs -c fluent-bit).
        # Phase 5: output plugin will be switched to Loki.
        - name: fluent-bit
          image: {{ .Values.fluentbit.image }}
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
          volumeMounts:
            - name: app-logs
              mountPath: /var/log/app
              readOnly: true
            - name: fluent-bit-config
              mountPath: /fluent-bit/etc/
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
