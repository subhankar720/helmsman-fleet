apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.appName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "golden-path-chart.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "golden-path-chart.selectorLabels" . | nindent 6 }}
  serviceName: {{ .Values.appName }}-headless
  podManagementPolicy: Parallel
  template:
    metadata:
      labels:
        {{- include "golden-path-chart.labels" . | nindent 8 }}
      annotations:
        helmsman.dev/cost-center: {{ .Values.costCenterId | quote }}
        helmsman.dev/owning-team: {{ .Values.owningTeam }}
    spec:
      serviceAccountName: {{ .Values.appName }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      volumes:
        - name: app-logs
          emptyDir: {}
        - name: fluent-bit-config
          configMap:
            name: {{ .Values.appName }}-fluent-bit-config
        {{- if .Values.oidc.enabled }}
        - name: oidc-secret
          secret:
            secretName: {{ .Values.appName }}-oidc
        {{- end }}
      containers:
        # ── Container 1: Application ─────────────────────────────────────────
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.container.command }}
          command: {{ .Values.container.command | toJson }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.container.port }}
              protocol: TCP
          env:
            - name: SERVER_PORT
              value: {{ .Values.container.port | quote }}
            {{- range $key, $value := .Values.container.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: app-logs
              mountPath: /var/log/app
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
        {{- if .Values.oidc.enabled }}
        # ── Container 2: ADC / oauth2-proxy ──────────────────────────────────
        # Mirrors Webstax's ADC sidecar: sits in front of the app container,
        # validates OIDC tokens before forwarding to localhost:<app-port>.
        # The Service exposes THIS port (4180), never the app port directly.
        - name: adc
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.8.2
          args:
            - --provider=oidc
            - --oidc-issuer-url=$(ISSUER_URL)
            - --client-id=$(CLIENT_ID)
            - --client-secret=$(CLIENT_SECRET)
            - --upstream=http://127.0.0.1:{{ .Values.container.port }}
            - --http-address=0.0.0.0:4180
            - --email-domain=*
            - --cookie-secure=false
            - --skip-provider-button=true
            - --redirect-url=http://localhost:4180/oauth2/callback
            - --cookie-name=_helmsman_session
          env:
            - name: ISSUER_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.appName }}-oidc
                  key: issuer-url
            - name: CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.appName }}-oidc
                  key: client-id
            - name: CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.appName }}-oidc
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.appName }}-oidc
                  key: cookie-secret
          ports:
            - name: proxy
              containerPort: 4180
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
        {{- end }}
        # ── Container 3: Fluent Bit (log shipper) ────────────────────────────
        - name: fluent-bit
          image: {{ .Values.fluentbit.image }}
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
          volumeMounts:
            - name: app-logs
              mountPath: /var/log/app
              readOnly: true
            - name: fluent-bit-config
              mountPath: /fluent-bit/etc/
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
