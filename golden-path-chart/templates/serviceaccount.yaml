apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.appName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "golden-path-chart.labels" . | nindent 4 }}
# Explicitly disabled — pods should not auto-mount the SA token unless they need it.
# Individual containers that need API access should mount it explicitly.
automountServiceAccountToken: false
