{{- if .Values.oidc.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.appName }}-oidc-registrar
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Values.appName }}-oidc-registrar
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.appName }}-oidc-registrar
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Values.appName }}-oidc-registrar
subjects:
  - kind: ServiceAccount
    name: {{ .Values.appName }}-oidc-registrar
    namespace: {{ .Release.Namespace }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.appName }}-oidc-registrar-script
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
data:
  register.py: |
    #!/usr/bin/env python3
    """
    Helmsman OIDC Registrar — v3
    Writes OIDC client credentials to Vault (KV v2).
    ESO then syncs them into a K8s Secret in the app namespace.
    The pod never talks to Vault directly — it just reads a mounted Secret.
    """
    import os, sys, json
    import urllib.request, urllib.parse, urllib.error

    KEYCLOAK_URL  = os.environ["KEYCLOAK_URL"].rstrip("/")
    ADMIN_USER    = os.environ["KEYCLOAK_ADMIN_USER"]
    ADMIN_PASS    = os.environ["KEYCLOAK_ADMIN_PASSWORD"]
    APP_NAME      = os.environ["APP_NAME"]
    APP_NAMESPACE = os.environ["APP_NAMESPACE"]
    REALM         = os.environ.get("KEYCLOAK_REALM", "helmsman")
    VAULT_ADDR    = os.environ["VAULT_ADDR"].rstrip("/")
    VAULT_TOKEN   = os.environ["VAULT_TOKEN"]

    def http(method, url, data=None, token=None, vault_token=None):
        headers = {"Content-Type": "application/json"}
        if token:
            headers["Authorization"] = f"Bearer {token}"
        if vault_token:
            headers["X-Vault-Token"] = vault_token
        if data and isinstance(data, dict):
            data = json.dumps(data).encode()
        elif data and isinstance(data, str):
            data = data.encode()
            headers["Content-Type"] = "application/x-www-form-urlencoded"
        req = urllib.request.Request(url, data=data, headers=headers, method=method)
        try:
            with urllib.request.urlopen(req) as resp:
                return resp.status, resp.headers, resp.read().decode()
        except urllib.error.HTTPError as e:
            return e.code, e.headers, e.read().decode()

    # ── Step 1: Get Keycloak admin token ─────────────────────────────────────
    token_data = urllib.parse.urlencode({
        "username": ADMIN_USER, "password": ADMIN_PASS,
        "grant_type": "password", "client_id": "admin-cli"
    })
    status, _, body = http("POST",
        f"{KEYCLOAK_URL}/realms/master/protocol/openid-connect/token",
        data=token_data)
    if status != 200:
        print(f"ERROR: Failed to get admin token (HTTP {status}): {body}")
        sys.exit(1)
    kc_token = json.loads(body)["access_token"]
    print("✓ Keycloak admin token obtained")

    # ── Step 2: Ensure Keycloak client exists (idempotent) ───────────────────
    status, _, body = http("GET",
        f"{KEYCLOAK_URL}/admin/realms/{REALM}/clients?clientId={APP_NAME}",
        token=kc_token)
    existing = json.loads(body)

    if existing:
        internal_id = existing[0]["id"]
        print(f"✓ Client '{APP_NAME}' already exists (id: {internal_id})")
    else:
        client_def = {
            "clientId": APP_NAME,
            "enabled": True,
            "publicClient": False,
            "standardFlowEnabled": True,
            "redirectUris": ["/*"],
            "protocol": "openid-connect",
            "attributes": {"helmsman.managed": "true"}
        }
        status, headers, body = http("POST",
            f"{KEYCLOAK_URL}/admin/realms/{REALM}/clients",
            data=client_def, token=kc_token)
        if status not in (201, 200):
            print(f"ERROR: Failed to create client (HTTP {status}): {body}")
            sys.exit(1)
        internal_id = headers.get("Location", "").rstrip("/").split("/")[-1]
        print(f"✓ Created client '{APP_NAME}' (id: {internal_id})")

    # ── Step 3: Get client secret from Keycloak ───────────────────────────────
    status, _, body = http("GET",
        f"{KEYCLOAK_URL}/admin/realms/{REALM}/clients/{internal_id}/client-secret",
        token=kc_token)
    if status != 200:
        print(f"ERROR: Failed to get client secret (HTTP {status}): {body}")
        sys.exit(1)
    client_secret = json.loads(body)["value"]
    print("✓ Client secret retrieved from Keycloak")

    # ── Step 4: Write to Vault KV v2 ─────────────────────────────────────────
    # Path: secret/data/apps/<appname>/oidc
    # ESO will sync this to a K8s Secret via ExternalSecret CRD
    vault_payload = {
        "data": {
            "client-id":     APP_NAME,
            "client-secret": client_secret,
            "issuer-url":    f"{KEYCLOAK_URL}/realms/{REALM}"
        }
    }
    status, _, body = http("POST",
        f"{VAULT_ADDR}/v1/secret/data/apps/{APP_NAME}/oidc",
        data=vault_payload, vault_token=VAULT_TOKEN)
    if status not in (200, 204):
        print(f"ERROR: Failed to write to Vault (HTTP {status}): {body}")
        sys.exit(1)
    print(f"✓ OIDC credentials written to Vault at secret/data/apps/{APP_NAME}/oidc")
    print("✓ Registration complete. ESO will sync to K8s Secret within 1h (or on next ExternalSecret refresh).")
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.appName }}-oidc-register
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: {{ .Values.appName }}-oidc-registrar
      restartPolicy: Never
      containers:
        - name: registrar
          image: python:3.12-slim
          command: ["python", "/scripts/register.py"]
          env:
            - name: APP_NAME
              value: {{ .Values.appName | quote }}
            - name: APP_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            - name: KEYCLOAK_URL
              valueFrom:
                secretKeyRef:
                  name: helmsman-platform-config
                  key: keycloak-url
            - name: KEYCLOAK_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: helmsman-platform-config
                  key: keycloak-admin-user
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: helmsman-platform-config
                  key: keycloak-admin-password
            - name: KEYCLOAK_REALM
              valueFrom:
                secretKeyRef:
                  name: helmsman-platform-config
                  key: keycloak-realm
            - name: VAULT_ADDR
              valueFrom:
                secretKeyRef:
                  name: helmsman-platform-config
                  key: vault-url
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: helmsman-platform-config
                  key: vault-token
          volumeMounts:
            - name: script
              mountPath: /scripts
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
      volumes:
        - name: script
          configMap:
            name: {{ .Values.appName }}-oidc-registrar-script
            defaultMode: 0755
{{- end }}
