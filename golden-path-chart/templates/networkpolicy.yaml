apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Values.appName }}-default-deny
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "golden-path-chart.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "golden-path-chart.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Values.appName }}-allow-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "golden-path-chart.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "golden-path-chart.selectorLabels" . | nindent 6 }}
  ingress:
    - ports:
        {{- if .Values.oidc.enabled }}
        - port: 4180
          protocol: TCP
        {{- else }}
        - port: {{ .Values.container.port }}
          protocol: TCP
        {{- end }}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Values.appName }}-allow-dns
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "golden-path-chart.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "golden-path-chart.selectorLabels" . | nindent 6 }}
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow egress to Keycloak for OIDC token validation
    - ports:
        - port: 30081
          protocol: TCP
    - ports:
        - port: 8080
          protocol: TCP
  policyTypes:
    - Egress
